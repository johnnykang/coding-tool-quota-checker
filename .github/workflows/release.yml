name: Release Stream Deck Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag value for manual release (e.g., v1.0.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Plugin
        run: npm run build

      - name: Validate Plugin
        run: npm run validate

      - name: Pack Plugin
        run: npm run pack

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: au.jkang.codingtoolquotachecker.streamDeckPlugin
          draft: false
          prerelease: false
          generate_release_notes: true
