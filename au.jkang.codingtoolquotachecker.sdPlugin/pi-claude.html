<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Claude Code Usage Settings</title>
    <style>
        body { font-family: sans-serif; font-size: 10pt; color: white; background-color: transparent; }
        .wrap { padding: 10px; box-sizing: border-box; }
        .row { margin-bottom: 8px; }
        label { display: block; margin-bottom: 2px; color: #ccc; }
        input[type="password"],
        input[type="text"],
        select { width: 100%; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; padding: 3px 5px; border-radius: 3px; }
        #saveButton { margin-top: 10px; width: 100%; padding: 5px; cursor: pointer; background: #CC785C; border: none; color: white; border-radius: 3px; }
        #saveButton:hover { background: #B5673D; }
        #status { font-size: 9pt; color: #88cc88; height: 1.2em; }
        .hint { font-size: 8pt; color: #888; margin-top: 2px; }
        a { color: #CC785C; }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="row">
            <div id="displayValue" style="background: #222; padding: 8px; border-radius: 3px; border: 1px solid #444; color: #fff; font-weight: bold; text-align: center; margin-bottom: 10px;">Waiting for data...</div>
        </div>
        <div class="row">
            <label for="sessionKey">Session Key:</label>
            <input type="password" id="sessionKey" placeholder="sk-ant-sid01-..." />
            <p class="hint">From claude.ai browser cookie named <code>sessionKey</code>.</p>
        </div>
        <div class="row">
            <label for="organizationId">Organisation ID:</label>
            <input type="text" id="organizationId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            <p class="hint">From <a href="https://claude.ai/settings/account" target="_blank">claude.ai/settings/account</a> → Organisation ID.</p>
        </div>
        <div class="row">
            <label for="usagePeriod">Usage Window:</label>
            <select id="usagePeriod">
                <option value="5-hour">5-hour (all models)</option>
                <option value="7-day">7-day (all models)</option>
                <option value="7-day-sonnet">7-day Sonnet</option>
                <option value="7-day-omelette">7-day Omelette (Claude Code)</option>
            </select>
        </div>
        <div class="row">
            <button id="saveButton">Save Settings</button>
        </div>
        <p id="status"></p>
    </div>

    <script>
        let websocket = null;
        let pluginUUID = null;
        let actionInfo = {};

        function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
            pluginUUID = inPluginUUID;
            actionInfo = JSON.parse(inActionInfo);

            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function () {
                websocket.send(JSON.stringify({ "event": inRegisterEvent, "uuid": pluginUUID }));
                // Non-secret settings (usagePeriod, organizationId)
                websocket.send(JSON.stringify({ "event": "getSettings", "context": pluginUUID }));
                // Ask plugin whether the secret is saved
                websocket.send(JSON.stringify({
                    "event": "sendToPlugin",
                    "action": actionInfo.action,
                    "context": pluginUUID,
                    "payload": { "type": "getSecretStatus", "keys": ["claude.sessionKey"] }
                }));
            };

            websocket.onmessage = function (evt) {
                const jsonObj = JSON.parse(evt.data);
                if (jsonObj.event === 'didReceiveSettings') {
                    const s = jsonObj.payload.settings;
                    if (s.organizationId) document.getElementById('organizationId').value = s.organizationId;
                    if (s.usagePeriod)    document.getElementById('usagePeriod').value = s.usagePeriod;
                } else if (jsonObj.event === 'sendToPropertyInspector') {
                    const p = jsonObj.payload;
                    if (p && p.type === 'secretStatus') {
                        const field = document.getElementById('sessionKey');
                        field.placeholder = p.status['claude.sessionKey']
                            ? '(saved \u2014 leave blank to keep)'
                            : 'sk-ant-sid01-\u2026';
                    } else if (p && p.type === 'updateDisplay') {
                        document.getElementById('displayValue').innerText = p.value;
                    }
                }
            };

            document.getElementById('saveButton').addEventListener('click', function () {
                const val = document.getElementById('sessionKey').value.trim();
                if (val) {
                    websocket.send(JSON.stringify({
                        "event": "sendToPlugin",
                        "action": actionInfo.action,
                        "context": pluginUUID,
                        "payload": { "type": "saveSecret", "key": "claude.sessionKey", "value": val }
                    }));
                    const field = document.getElementById('sessionKey');
                    field.value = '';
                    field.placeholder = '(saved \u2014 leave blank to keep)';
                }
                // Non-secrets always saved
                websocket.send(JSON.stringify({
                    "event": "setSettings",
                    "context": pluginUUID,
                    "payload": {
                        organizationId: document.getElementById('organizationId').value,
                        usagePeriod:    document.getElementById('usagePeriod').value
                    }
                }));
                const status = document.getElementById('status');
                status.innerText = 'Saved!';
                setTimeout(() => status.innerText = '', 2000);
            });
        }
    </script>
