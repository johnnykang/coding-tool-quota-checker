<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Copilot Quota Checker Settings</title>
    <style>
        body { font-family: sans-serif; font-size: 10pt; color: white; background-color: transparent;}
        .wrap { padding: 10px; box-sizing: border-box; }
        .row { margin-bottom: 5px; }
        label { display: block; margin-bottom: 2px; }
        input[type="password"] { width: 100%; box-sizing: border-box; }
        #saveButton { margin-top: 10px; width: 100%; padding: 5px; cursor: pointer; }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="row">
            <div id="displayValue" style="background: #222; padding: 8px; border-radius: 3px; border: 1px solid #444; color: #fff; font-weight: bold; text-align: center; margin-bottom: 10px;">Waiting for data...</div>
        </div>
        <div class="row">
            <label for="authToken">GitHub Copilot Auth Token:</label>
            <input type="password" id="authToken" placeholder="ghu_..." />
        </div>
        <div class="row">
            <button id="saveButton">Save Token</button>
        </div>
        <p id="status"></p>
    </div>

    <script>
        let websocket = null;
        let pluginUUID = null;
        let actionInfo = {};

        function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
            pluginUUID = inPluginUUID;
            actionInfo = JSON.parse(inActionInfo);
            
            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function () {
                // Register property inspector
                websocket.send(JSON.stringify({
                    "event": inRegisterEvent,
                    "uuid": pluginUUID
                }));

                // Get settings
                websocket.send(JSON.stringify({
                    "event": "getSettings",
                    "context": pluginUUID
                }));
            };

            websocket.onmessage = function (evt) {
                const jsonObj = JSON.parse(evt.data);
                if (jsonObj.event === 'didReceiveSettings') {
                    const settings = jsonObj.payload.settings;
                    if (settings.authToken) {
                        document.getElementById('authToken').value = settings.authToken;
                    }
                } else if (jsonObj.event === 'sendToPropertyInspector') {
                    if (jsonObj.payload && jsonObj.payload.type === 'updateDisplay') {
                        document.getElementById('displayValue').innerText = jsonObj.payload.value;
                    }
                }
            };
            
            document.getElementById('saveButton').addEventListener('click', function() {
                const token = document.getElementById('authToken').value;
                const payload = { authToken: token };
                websocket.send(JSON.stringify({
                    "event": "setSettings",
                    "context": pluginUUID,
                    "payload": payload
                }));
                const status = document.getElementById('status');
                status.innerText = "Saved!";
                setTimeout(() => status.innerText = "", 2000);
            });
        }
    </script>
</body>

</html>
