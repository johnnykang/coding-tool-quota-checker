<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Copilot Quota Checker Settings</title>
    <style>
        body { font-family: sans-serif; font-size: 10pt; color: white; background-color: transparent;}
        .wrap { padding: 10px; box-sizing: border-box; }
        .row { margin-bottom: 5px; }
        label { display: block; margin-bottom: 2px; }
        input[type="password"] { width: 100%; box-sizing: border-box; }
        #saveButton { margin-top: 10px; width: 100%; padding: 5px; cursor: pointer; }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="row">
            <div id="displayValue" style="background: #222; padding: 8px; border-radius: 3px; border: 1px solid #444; color: #fff; font-weight: bold; text-align: center; margin-bottom: 10px;">Waiting for data...</div>
        </div>
        <div class="row">
            <label for="authToken">GitHub Copilot Auth Token:</label>
            <input type="password" id="authToken" placeholder="ghu_..." />
        </div>
        <div class="row">
            <button id="saveButton">Save Token</button>
        </div>
        <p id="status"></p>
    </div>

    <script>
        let websocket = null;
        let pluginUUID = null;
        let actionInfo = {};

        function connectElgatoStreamDeckSocket(inPort, inPluginUUID, inRegisterEvent, inInfo, inActionInfo) {
            pluginUUID = inPluginUUID;
            actionInfo = JSON.parse(inActionInfo);

            websocket = new WebSocket('ws://127.0.0.1:' + inPort);

            websocket.onopen = function () {
                websocket.send(JSON.stringify({ "event": inRegisterEvent, "uuid": pluginUUID }));
                // Ask plugin whether the secret is already saved (plugin checks globalSettings)
                websocket.send(JSON.stringify({
                    "event": "sendToPlugin",
                    "action": actionInfo.action,
                    "context": pluginUUID,
                    "payload": { "type": "getSecretStatus", "keys": ["copilot.authToken"] }
                }));
            };

            websocket.onmessage = function (evt) {
                const jsonObj = JSON.parse(evt.data);
                if (jsonObj.event === 'sendToPropertyInspector') {
                    const p = jsonObj.payload;
                    if (p && p.type === 'secretStatus') {
                        const field = document.getElementById('authToken');
                        field.placeholder = p.status['copilot.authToken']
                            ? '(saved \u2014 leave blank to keep)'
                            : 'ghu_\u2026';
                    } else if (p && p.type === 'updateDisplay') {
                        document.getElementById('displayValue').innerText = p.value;
                    }
                }
            };

            document.getElementById('saveButton').addEventListener('click', function () {
                const val = document.getElementById('authToken').value.trim();
                if (val) {
                    // Send plaintext to plugin — plugin encrypts and stores in globalSettings.
                    websocket.send(JSON.stringify({
                        "event": "sendToPlugin",
                        "action": actionInfo.action,
                        "context": pluginUUID,
                        "payload": { "type": "saveSecret", "key": "copilot.authToken", "value": val }
                    }));
                    // Update placeholder to reflect saved state.
                    const field = document.getElementById('authToken');
                    field.value = '';
                    field.placeholder = '(saved \u2014 leave blank to keep)';
                }
                const status = document.getElementById('status');
                status.innerText = val ? 'Saved!' : 'Nothing changed.';
                setTimeout(() => status.innerText = '', 2000);
            });
        }
    </script>

</body>

</html>
